<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shieldbearer Signal Room</title>
  <meta name="description" content="Event-driven Signal Room rendered from the EventStream feed on GitHub Pages.">
  <meta name="theme-color" content="#090909">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap');

    :root {
      --bg: #090909;
      --panel: rgba(255,255,255,.04);
      --panel-strong: rgba(255,255,255,.08);
      --line: rgba(231,76,60,.24);
      --text: #f3efe6;
      --muted: rgba(243,239,230,.72);
      --accent: #e74c3c;
      --accent-soft: rgba(231,76,60,.14);
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; color: var(--text); font-family: var(--sans); }
    body {
      min-height: 100vh;
      padding: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
      color: #3b2615;
      background-color: #7a4c27;
      background-image:
        radial-gradient(ellipse 90px 55px at 12% 18%, rgba(22,12,4,0.65) 0%, transparent 72%),
        radial-gradient(ellipse 72px 46px at 83% 66%, rgba(22,12,4,0.55) 0%, transparent 72%),
        radial-gradient(ellipse 52px 32px at 46% 88%, rgba(28,16,6,0.5) 0%, transparent 70%),
        radial-gradient(ellipse 62px 38px at 68% 14%, rgba(22,12,4,0.5) 0%, transparent 72%),
        radial-gradient(ellipse 48px 28px at 30% 62%, rgba(26,14,5,0.45) 0%, transparent 70%),
        url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='1200' height='1200'%3E%3Cfilter id='w'%3E%3CfeTurbulence type='turbulence' baseFrequency='0.012 0.22' numOctaves='2' seed='3'/%3E%3CfeColorMatrix values='0 0 0 0 0.22  0 0 0 0 0.12  0 0 0 0 0.04  0 0 0 0.34 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23w)'/%3E%3C/svg%3E"),
        linear-gradient(90deg,
          transparent calc(16% - 1.5px), rgba(18,9,3,0.7) 16%, rgba(18,9,3,0.7) calc(16% + 2px), transparent calc(16% + 4px),
          transparent calc(41% - 1.5px), rgba(18,9,3,0.65) 41%, rgba(18,9,3,0.65) calc(41% + 2px), transparent calc(41% + 4px),
          transparent calc(58% - 1.5px), rgba(18,9,3,0.65) 58%, rgba(18,9,3,0.65) calc(58% + 2px), transparent calc(58% + 4px),
          transparent calc(83% - 1.5px), rgba(18,9,3,0.7) 83%, rgba(18,9,3,0.7) calc(83% + 2px), transparent calc(83% + 4px)
        ),
        linear-gradient(180deg, #8b5a32 0%, #7a4d27 50%, #603818 100%);
      overflow-x: hidden;
    }
    body.is-loaded { opacity: 1; }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 24px 20px 72px; position: relative; z-index: 2; }
    header,
    footer {
      border: 1px solid rgba(255,255,255,.05);
      background: rgba(255,255,255,.015);
      border-radius: 18px;
      padding: 14px 18px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }
    .signal-room-header {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      text-align: center;
      pointer-events: none;
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
    }
    .nav__brand {
      font-family: var(--mono);
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--text);
      font-size: .78rem;
    }
    .nav__link {
      color: var(--muted);
      text-decoration: none;
      font-size: .9rem;
    }
    .signal-desk-scene {
      position: relative;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(320px, 1.4fr);
      gap: 18px;
      min-height: 60vh;
      padding-top: 14vh;
      padding-bottom: 6vh;
    }
    .signal-desk-scene > * {
      animation: signal-fade-in 420ms ease-out both;
      position: relative;
      z-index: 2;
    }
    .signal-desk-scene > *:nth-child(2) {
      animation-delay: 70ms;
    }
    .signal-desk-scene > *:nth-child(3) {
      animation-delay: 140ms;
    }
    .signal-desk-scene--single {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 10vh;
    }
    #artwork,
    #notebook {
      border: 1px solid rgba(255,255,255,.02);
      background: transparent;
      border-radius: 20px;
      padding: 22px;
    }
    .signal-desk-scene--single #artwork,
    .signal-desk-scene--single #notebook {
      width: min(100%, 680px);
    }
    .signal-room-view__title {
      margin: 0 0 12px;
      font-size: .82rem;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .signal-room-view__artwork {
      width: 100%;
      max-width: 560px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.08);
      display: block;
      margin: 0 0 18px;
    }
    .signal-artframe {
      position: relative;
      width: min(100%, 560px);
      margin: 0 auto 12px;
      padding: 18px 18px 16px;
      border-radius: 20px;
      background: linear-gradient(180deg, #1a120a 0%, #0e0805 100%);
      box-shadow:
        0 28px 42px rgba(0,0,0,0.55),
        0 10px 18px rgba(0,0,0,0.4),
        0 2px 4px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,220,170,0.08);
      transform: rotate(-2.5deg);
      transform-origin: center center;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .signal-artframe:hover {
      transform: rotate(0deg);
    }
    .signal-artframe::before {
      display: none;
    }
    .signal-artwork-wrap {
      position: relative;
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .signal-artwork-wrap::before {
      display: none;
    }
    .signal-artframe__mat {
      padding: 18px;
      border-radius: 14px;
      background: linear-gradient(180deg, #f2e8d4 0%, #eadfc5 100%);
      box-shadow: inset 0 0 0 1px rgba(96, 74, 48, .16);
    }
    .signal-artframe__image {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .22);
    }
    .signal-artframe__caption {
      margin: 12px 0 0;
      text-align: center;
      font-family: "Caveat", cursive;
      font-size: clamp(1.5rem, 3vw, 2rem);
      line-height: 1;
      color: #3b2615;
    }
    .signal-notebook {
      width: min(100%, 620px);
      margin: 0 auto;
      position: relative;
      transform: rotate(0.3deg);
      transform-origin: center top;
      border-radius: 18px;
      padding: 26px 24px 26px 42px;
      background:
        linear-gradient(90deg, rgba(185, 146, 92, .18) 0 18px, transparent 18px 100%),
        repeating-linear-gradient(180deg, rgba(88, 61, 31, .06) 0 1px, transparent 1px 34px),
        linear-gradient(180deg, #f4e9cf 0%, #efe1bf 100%);
      box-shadow:
        0 30px 60px rgba(0,0,0,0.8),
        0 8px 20px rgba(0,0,0,0.6),
        0 2px 4px rgba(0,0,0,0.4),
        0 -1px 0 rgba(255, 220, 120, 0.08),
        inset 0 0 0 1px rgba(91, 63, 28, .18);
      color: #3f2a17;
      overflow: hidden;
      transition: transform 220ms ease, box-shadow 220ms ease;
      opacity: 0;
      transition: opacity 0.8s ease, transform 220ms ease, box-shadow 220ms ease;
    }
    .signal-notebook:hover {
      transform: rotate(0deg) translateY(-2px);
      box-shadow:
        0 24px 48px rgba(0, 0, 0, .3),
        inset 0 0 0 1px rgba(91, 63, 28, .22);
    }
    .signal-notebook::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(180deg, rgba(255, 240, 200, 0.03) 0%, transparent 100%);
      pointer-events: none;
      border-radius: 2px 2px 0 0;
    }
    .signal-notebook__corner-pencil {
      position: absolute;
      top: 16px;
      right: 18px;
      width: 30px;
      height: 30px;
      opacity: .42;
      transform: rotate(-22deg);
      transform-origin: center center;
      pointer-events: none;
    }
    .signal-notebook::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 22px;
      width: 2px;
      background: rgba(168, 61, 35, .24);
      pointer-events: none;
    }
    .signal-notebook__title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 10px;
      font-family: "Caveat", cursive;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: .95;
      font-weight: 700;
      letter-spacing: .01em;
      color: #2f1c0f;
    }
    .signal-notebook__pencil {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      color: #8d5b22;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,.18));
    }
    .signal-notebook__paper {
      position: relative;
      padding: 6px 0 2px;
    }
    .signal-notebook__line {
      font-family: "Caveat", cursive;
      font-size: clamp(1.55rem, 2.7vw, 2rem);
      line-height: 1.04;
      letter-spacing: .01em;
      color: #422714;
      margin: 0 0 4px;
      white-space: pre-wrap;
    }
    .signal-notebook__line--blank {
      min-height: 1em;
    }
    .signal-notebook__fade {
      position: absolute;
      left: 42px;
      right: 20px;
      bottom: 20px;
      height: 96px;
      background: linear-gradient(180deg, rgba(239, 225, 191, 0) 0%, rgba(239, 225, 191, .84) 62%, rgba(239, 225, 191, 1) 100%);
      pointer-events: none;
    }
    .signal-notebook--teaser .signal-notebook__paper {
      max-height: 320px;
      overflow: hidden;
    }
    .signal-notebook--teaser .signal-notebook__line:last-of-type {
      margin-bottom: 0;
    }
    .signal-room-view__empty {
      color: rgba(243,239,230,.66);
      font-size: 1rem;
      line-height: 1.7;
    }
    .signal-room--empty header,
    .signal-room--empty footer,
    .signal-room--empty #artwork {
      display: none;
    }
    .signal-room--empty .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-block: 0;
    }
    .signal-room--empty .signal-desk-scene {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: auto;
      width: 100%;
      padding-top: 18vh;
    }
    .signal-room--empty #notebook {
      width: min(100%, 680px);
      border: none;
      background: transparent;
      padding: 0;
      text-align: center;
    }
    footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: .88rem;
    }
    .desk-plant {
      position: fixed;
      top: -4vh;
      left: 8vw;
      width: 160px;
      height: 180px;
      z-index: 3;
      pointer-events: none;
      filter: drop-shadow(6px 14px 18px rgba(0,0,0,0.5));
    }
    .desk-plant__leaves {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 75%;
    }
    .desk-plant__pot {
      position: absolute;
      bottom: 0;
      left: 50%;
      margin-left: -38px;
      width: 76px;
      height: 48px;
      border-radius: 8px 8px 4px 4px;
      background: linear-gradient(180deg, #ece5d4 0%, #d8cfba 60%, #bbb19a 100%);
      box-shadow:
        inset 0 -8px 10px rgba(60,40,20,0.18),
        inset 0 3px 0 rgba(255,255,255,0.55),
        0 2px 0 rgba(90,70,40,0.3);
    }
    .desk-plant__pot::before {
      content: "";
      position: absolute;
      top: -6px;
      left: -4px;
      right: -4px;
      height: 10px;
      border-radius: 6px;
      background: linear-gradient(180deg, #e3dbc7 0%, #c8beaa 100%);
      box-shadow: inset 0 -2px 4px rgba(60,40,20,0.25);
    }
    .desk-crumpled {
      position: fixed;
      width: 82px;
      height: 82px;
      z-index: 3;
      pointer-events: none;
      filter: drop-shadow(4px 10px 14px rgba(0,0,0,0.55));
    }
    .desk-crumpled--a {
      top: 16vh;
      right: 22vw;
      transform: rotate(-12deg) scale(0.95);
    }
    .desk-crumpled--b {
      bottom: 18vh;
      left: 12vw;
      transform: rotate(22deg) scale(0.85);
    }
    .desk-pencil {
      position: fixed;
      bottom: 6vh;
      left: 4vw;
      transform: rotate(-20deg);
      z-index: 2;
      pointer-events: none;
      filter: drop-shadow(2px 6px 8px rgba(0,0,0,0.55));
    }
    .desk-scrap {
      position: fixed;
      bottom: 5vh;
      right: 18vw;
      width: 140px;
      padding: 8px 10px;
      background: linear-gradient(180deg, #eadcb4 0%, #d9c797 100%);
      transform: rotate(6deg);
      z-index: 2;
      pointer-events: none;
      box-shadow:
        0 10px 18px rgba(0,0,0,0.5),
        0 3px 6px rgba(0,0,0,0.3),
        inset 0 0 0 1px rgba(90,70,40,0.18);
      font-family: "Caveat", cursive;
      color: #3f2a17;
      clip-path: polygon(0 6%, 96% 0, 100% 100%, 4% 98%);
    }
    .desk-scrap__line {
      font-size: 1.15rem;
      line-height: 1.1;
    }
    .desk-scrap__line--small {
      margin-top: 2px;
      font-size: 0.9rem;
      color: #5a3c1e;
    }
    .desk-pick {
      position: fixed;
      bottom: 60px;
      right: 8vw;
      transform: rotate(25deg);
      opacity: 0.7;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
      z-index: 2;
      pointer-events: none;
    }
    .desk-coffee-ring {
      position: fixed;
      bottom: 80px;
      left: 10vw;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(150, 100, 50, 0.4);
      box-shadow:
        0 0 0 1px rgba(150, 100, 50, 0.22),
        inset 0 0 10px rgba(150, 100, 50, 0.18);
      z-index: 2;
      pointer-events: none;
    }
    .signal-room-header .nav__link {
      display: none;
    }
    .signal-room-heading {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(14px, 3vw, 26px);
      color: rgba(250, 235, 210, 0.82);
      letter-spacing: .42em;
      text-transform: uppercase;
      margin: 0;
      text-shadow:
        0 1px 0 rgba(40,22,10,0.85),
        0 2px 3px rgba(0,0,0,0.55);
    }
    .signal-room-eyebrow {
      display: none;
    }
    @keyframes signal-fade-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes notebook-rest {
      0%, 100% { transform: rotate(0.3deg) translateY(0px); }
      50% { transform: rotate(0.3deg) translateY(-2px); }
    }
    @media (max-width: 760px) {
      .wrap { padding-inline: 14px; }
      .signal-desk-scene {
        grid-template-columns: 1fr;
        padding-top: 10vh;
        padding-bottom: 4vh;
        perspective: none;
      }
      .desk-pick {
        right: 28px;
        bottom: 12px;
      }
      .desk-coffee-ring {
        left: 28px;
        bottom: 24px;
      }
      .desk-plant,
      .desk-crumpled,
      .desk-pencil,
      .desk-scrap {
        display: none;
      }
      .signal-room--empty .signal-desk-scene {
        padding-top: 12vh;
      }
    }
  </style>
</head>
<body>
  <div class="desk-plant" aria-hidden="true">
    <div class="desk-plant__pot"></div>
    <svg class="desk-plant__leaves" viewBox="0 0 160 120" aria-hidden="true">
      <g fill="#4c7a28" stroke="#2f4f18" stroke-width="1" stroke-linejoin="round">
        <path d="M80 100 C70 70 55 45 40 25 C55 45 68 65 78 100Z"/>
        <path d="M80 100 C72 75 60 50 50 30 C62 55 72 78 80 100Z"/>
        <path d="M80 100 C80 70 80 40 80 12 C80 42 82 72 82 100Z" fill="#5c8d32"/>
        <path d="M80 100 C90 72 104 48 118 28 C106 52 94 76 82 100Z"/>
        <path d="M80 100 C92 76 110 58 128 42 C112 64 96 82 84 100Z" fill="#3e6520"/>

  <div class="desk-crumpled desk-crumpled--a" aria-hidden="true">

      <polygon points="10,30 25,8 50,4 70,20 75,48 60,70 30,72 8,55" fill="#f1ece0" stroke="#b9a77f" stroke-width="1" stroke-linejoin="round"/>
      <polygon points="18,32 30,18 46,16 60,28 56,44 46,58 28,58 16,48" fill="#dcd3bc" opacity="0.55"/>
      <polygon points="32,28 40,22 52,30 48,42 38,44 30,38" fill="#c8bd9a" opacity="0.5"/>
    </svg>
  </div>
  <div class="desk-crumpled desk-crumpled--b" aria-hidden="true">
    <svg viewBox="0 0 80 80" aria-hidden="true">
      <polygon points="6,28 22,6 48,8 68,22 74,50 58,72 26,70 10,50" fill="#f3ede1" stroke="#b9a77f" stroke-width="1" stroke-linejoin="round"/>
      <polygon points="14,30 28,16 46,18 58,30 54,46 42,58 24,56 14,46" fill="#ded4be" opacity="0.6"/>
    </svg>
  </div>
  <div class="desk-pencil" aria-hidden="true">
    <svg viewBox="0 0 180 20" width="180" height="20">
      <rect x="6" y="4" width="140" height="12" fill="#d4a02a" stroke="#7a5a10" stroke-width="0.5"/>
      <rect x="6" y="4" width="140" height="3" fill="#e8b840" opacity="0.8"/>
      <rect x="146" y="3" width="14" height="14" fill="#3b342b" stroke="#1e1a14" stroke-width="0.5"/>
      <rect x="160" y="5" width="10" height="10" fill="#d26a4a" stroke="#7a3a20" stroke-width="0.5"/>
      <polygon points="0,10 6,4 6,16" fill="#efd7a8" stroke="#7a5a10" stroke-width="0.5"/>
      <polygon points="0,10 6,4 3,10" fill="#2a2218"/>
    </svg>
  </div>
  <div class="desk-scrap" aria-hidden="true">
    <div class="desk-scrap__line">G — D — Em — C</div>
    <div class="desk-scrap__line desk-scrap__line--small">capo 2 ·  bridge?</div>
  </div>
  <div class="wrap">
    <header class="signal-room-header">
      <h1 class="signal-room-heading">Signal Room</h1>
      <div class="signal-room-eyebrow">Shieldbearer</div>
    </header>
    <main class="signal-desk-scene">
      <div class="desk-coffee-ring" aria-hidden="true"></div>
      <div class="desk-pick" aria-hidden="true">
        <svg viewBox="0 0 30 36" width="30" height="36">
          <path d="M15 2 C6 2 2 10 2 18 C2 28 10 34 15 34 C20 34 28 28 28 18 C28 10 24 2 15 2Z"
                fill="#c9a84c" opacity="0.6" stroke="#a07820" stroke-width="0.5"/>
          <text x="15" y="20" text-anchor="middle" font-size="6" fill="#805010" opacity="0.8">SB</text>
        </svg>
      </div>
      <div id="artwork"></div>
      <div id="notebook"></div>
    </main>
    <footer>
      Powered by the Shieldbearer event pipeline.
    </footer>
  </div>

  <script>
    const SITE_JSON_URL = window.SIGNAL_ROOM_SITE_JSON_URL || "./site.json";
    const artworkNode = document.getElementById("artwork");
    const notebookNode = document.getElementById("notebook");
    const ARTWORK_CACHE_BUSTER = Date.now().toString(36);

    function normalizeText(value) {
      return String(value || "").trim();
    }

    function normalizeComingSoonEntry(item) {
      return {
        title: normalizeText(item?.title),
        lyrics: normalizeText(item?.lyrics),
        teaserLyrics: normalizeText(item?.teaserLyrics || item?.lyricsPreview || item?.teaser || ""),
        artwork: normalizeText(item?.artwork),
        songMeaning: normalizeText(item?.songMeaning || item?.meaning || ""),
        status: normalizeText(item?.status || "coming_soon")
      };
    }

    function extractNormalizedSongModel(siteJson) {
      const comingSoon = Array.isArray(siteJson?.comingSoon)
        ? siteJson.comingSoon
        : Array.isArray(siteJson?.incoming)
          ? siteJson.incoming
          : Array.isArray(siteJson?.signal)
            ? siteJson.signal
            : [];
      const source = comingSoon[0] || {};

      return normalizeComingSoonEntry(source);
    }

    function splitLyricsIntoStanzas(lyricsText) {
      return String(lyricsText || "")
        .replace(/\r\n?/g, "\n")
        .trim()
        .split(/\n\s*\n+/)
        .map((stanza) =>
          stanza
            .split("\n")
            .map((line) => line.trimEnd())
            .filter((line, index, lines) => line.length || lines.length === 1)
        )
        .filter((stanza) => stanza.some((line) => line.trim().length));
    }

    function isChorusMarker(line) {
      return /(?:^|\b)(chorus|refrain|hook)(?:\b|:|\s|-)/i.test(String(line || "").trim());
    }

    function withCacheBust(url) {
      const normalized = String(url || "").trim();
      if (!normalized) {
        return "";
      }
      const separator = normalized.includes("?") ? "&" : "?";
      return `${normalized}${separator}v=${encodeURIComponent(ARTWORK_CACHE_BUSTER)}`;
    }

    function buildNotebookPreviewLines(song) {
      const fullLyrics = String(song?.lyrics || "").trim();
      const teaserLyrics = String(song?.teaserLyrics || "").trim();
      const source = fullLyrics || teaserLyrics;
      if (!source) {
        return [];
      }

      const stanzas = splitLyricsIntoStanzas(source);
      if (!stanzas.length) {
        return source.split(/\r?\n/).map((line) => line.trimEnd());
      }

      const preview = [];
      const firstVerse = stanzas[0];
      preview.push(...firstVerse);

      const chorusIndex = stanzas.findIndex((stanza, index) => {
        if (index === 0) {
          return false;
        }
        return stanza.some((line) => isChorusMarker(line));
      });

      if (chorusIndex > 0) {
        preview.push("");
        const chorus = stanzas[chorusIndex].filter((line, lineIndex) => {
          if (lineIndex === 0 && isChorusMarker(line)) {
            return false;
          }
          return true;
        });
        preview.push(...chorus);
      } else if (stanzas.length > 1) {
        preview.push("");
      }

      return preview;
    }

    function renderEmpty() {
      document.body.classList.add("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.add("signal-desk-scene--single");
      }
      if (artworkNode) {
        artworkNode.innerHTML = "";
      }
      if (notebookNode) {
        notebookNode.className = "signal-room-view__empty";
        notebookNode.textContent = "Something is coming\nStay in the Signal to hear it first";
      }
    }

    function renderTitleOnly(song) {
      document.body.classList.remove("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.add("signal-desk-scene--single");
      }
      if (artworkNode) {
        artworkNode.innerHTML = "";
      }
      if (notebookNode) {
        notebookNode.className = "signal-room-view__empty";
        notebookNode.textContent = song?.title || "Untitled";
      }
    }

    function renderArtworkFrame(song) {
      if (artworkNode) {
        artworkNode.className = "";
        artworkNode.innerHTML = "";
      }
      const wrap = document.createElement("section");
      wrap.className = "signal-artwork-wrap";
      const frame = document.createElement("section");
      frame.className = "signal-artframe";

      const mat = document.createElement("div");
      mat.className = "signal-artframe__mat";

      const img = document.createElement("img");
      img.className = "signal-artframe__image";
      img.alt = song?.title || "Song artwork";
      img.src = withCacheBust(song?.artwork || "");

      const caption = document.createElement("p");
      caption.className = "signal-artframe__caption";
      caption.textContent = song?.title || "Untitled";

      mat.appendChild(img);
      frame.appendChild(mat);
      frame.appendChild(caption);
      wrap.appendChild(frame);
      artworkNode.appendChild(wrap);
    }

    function renderArtworkOnly(song) {
      document.body.classList.remove("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.add("signal-desk-scene--single");
      }
      if (notebookNode) {
        notebookNode.className = "";
        notebookNode.innerHTML = "";
      }
      renderArtworkFrame(song);
    }

    function renderNotebook(song) {
      if (notebookNode) {
        notebookNode.className = "";
        notebookNode.innerHTML = "";
      }

      const notebook = document.createElement("section");
      notebook.className = "signal-notebook";

      const pencil = document.createElement("svg");
      pencil.className = "signal-notebook__corner-pencil";
      pencil.setAttribute("viewBox", "0 0 24 24");
      pencil.setAttribute("aria-hidden", "true");
      pencil.innerHTML = '<path fill="currentColor" d="M3 17.25V21h3.75L17.8 9.95l-3.75-3.75L3 17.25Zm14.71-8.04a1 1 0 0 0 0-1.41l-1.51-1.51a1 1 0 0 0-1.41 0l-1.2 1.2 2.93 2.93 1.19-1.21Z"/>';

      const title = document.createElement("h2");
      title.className = "signal-notebook__title";
      title.innerHTML = `
        <svg class="signal-notebook__pencil" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M3 17.25V21h3.75L17.8 9.95l-3.75-3.75L3 17.25Zm14.71-8.04a1 1 0 0 0 0-1.41l-1.51-1.51a1 1 0 0 0-1.41 0l-1.2 1.2 2.93 2.93 1.19-1.21Z"/>
        </svg>
        <span>${song?.title || "Untitled"}</span>
      `;

      const paper = document.createElement("div");
      paper.className = "signal-notebook__paper";

      const lines = buildNotebookPreviewLines(song);
      lines.forEach((line) => {
        const row = document.createElement("div");
        row.className = line.trim() ? "signal-notebook__line" : "signal-notebook__line signal-notebook__line--blank";
        row.textContent = line;
        paper.appendChild(row);
      });

      if ((song?.lyrics || song?.teaserLyrics || "").trim()) {
        notebook.classList.add("signal-notebook--teaser");
        const fade = document.createElement("div");
        fade.className = "signal-notebook__fade";
        notebook.appendChild(fade);
      }

      notebook.appendChild(pencil);
      notebook.appendChild(title);
      notebook.appendChild(paper);
      notebookNode.appendChild(notebook);
    }

    function renderLyricsOnly(song) {
      document.body.classList.remove("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.add("signal-desk-scene--single");
      }
      if (artworkNode) {
        artworkNode.className = "";
        artworkNode.innerHTML = "";
      }
      renderNotebook(song);
    }

    function renderFull(song) {
      document.body.classList.remove("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.remove("signal-desk-scene--single");
      }
      renderArtworkFrame(song);
      renderNotebook(song);
    }

    function renderFromModel(data) {
      const song = data?.comingSoon?.[0];

      const hasTitle = !!song?.title;
      const hasLyrics = !!(song?.lyrics || song?.teaserLyrics);
      const hasArtwork = !!song?.artwork;

      if (!hasTitle) renderEmpty();
      else if (hasLyrics && hasArtwork) renderFull(song);
      else if (hasLyrics) renderLyricsOnly(song);
      else if (hasArtwork) renderArtworkOnly(song);
      else renderTitleOnly(song);
    }

    async function loadSongModel() {
      try {
        const res = await fetch(SITE_JSON_URL, { cache: "no-store" });
        if (!res.ok) {
          throw new Error("site.json fetch failed with HTTP " + res.status);
        }
        const siteJson = await res.json();
        const model = extractNormalizedSongModel(siteJson);
        renderFromModel({ comingSoon: [model] });
        window.__SIGNAL_ROOM_MODEL__ = model;
        window.__SIGNAL_ROOM_SOURCE__ = SITE_JSON_URL;
        return model;
      } catch (error) {
        const emptyModel = {
          title: "",
          lyrics: "",
          teaserLyrics: "",
          artwork: "",
          songMeaning: "",
          status: ""
        };
        window.__SIGNAL_ROOM_MODEL__ = emptyModel;
        window.__SIGNAL_ROOM_SOURCE__ = SITE_JSON_URL;
        renderFromModel({ comingSoon: [emptyModel] });
        console.error(error);
        return emptyModel;
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.body.classList.add("is-loaded");
        });
      });
    });

    loadSongModel().then(() => {
      const scene = document.querySelector(".signal-desk-scene");
      const artwork = document.querySelector(".signal-artwork-wrap");
      const notebook = document.querySelector(".signal-notebook");
      if (scene && !document.body.classList.contains("signal-room--empty")) {
        scene.style.opacity = "1";
      }
      if (artwork) {
        artwork.style.opacity = "1";
      }
      if (notebook) {
        notebook.style.opacity = "1";
      }
    });
  </script>
</body>
</html>
