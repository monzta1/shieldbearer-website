<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shieldbearer Writing Desk</title>
  <meta name="description" content="Live from the Shieldbearer writing desk. Watch the song take shape in a warm, tactile studio scene.">
  <meta name="theme-color" content="#7a4c27">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap');

    :root {
      --bg: #090909;
      --panel: rgba(255,255,255,.04);
      --panel-strong: rgba(255,255,255,.08);
      --line: rgba(231,76,60,.24);
      --text: #f3efe6;
      --muted: rgba(243,239,230,.72);
      --accent: #e74c3c;
      --accent-soft: rgba(231,76,60,.14);
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; color: var(--text); font-family: var(--sans); }
    body {
      min-height: 100vh;
      padding: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
      color: #3b2615;
      background-color: #120c08;
      overflow-x: hidden;
    }
    body.is-loaded { opacity: 1; }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 24px 20px 72px; position: relative; z-index: 2; }
    header,
    footer {
      border: 1px solid rgba(255,255,255,.05);
      background: rgba(255,255,255,.015);
      border-radius: 18px;
      padding: 14px 18px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }
    .signal-room-header {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      text-align: center;
      pointer-events: none;
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
    }
    .nav__brand {
      font-family: var(--mono);
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--text);
      font-size: .78rem;
    }
    .nav__link {
      color: var(--muted);
      text-decoration: none;
      font-size: .9rem;
    }
    .signal-desk-scene {
      position: relative;
      display: block;
      width: min(100%, 1536px);
      margin: 0 auto;
      min-height: 100vh;
      padding: 0;
      overflow: hidden;
    }
    .signal-desk-scene > * {
      animation: signal-fade-in 420ms ease-out both;
      position: relative;
      z-index: 2;
    }
    .signal-desk-scene > *:nth-child(2) {
      animation-delay: 70ms;
    }
    .signal-desk-scene > *:nth-child(3) {
      animation-delay: 140ms;
    }
    .signal-desk-scene--single {
      min-height: auto;
    }
    .signal-desk-photo {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      pointer-events: none;
    }
    #artwork,
    #notebook {
      position: absolute;
      border: 0;
      background: transparent;
      padding: 0;
      container-type: inline-size;
    }
    #artwork {
      top: 5.4%;
      left: 5.5%;
      width: 19.9%;
      height: 41%;
      transform: rotate(-2deg);
      transform-origin: top left;
    }
    #notebook {
      top: 6.8%;
      left: 36.5%;
      width: 29.9%;
      height: 78%;
      transform: rotate(0.5deg);
      transform-origin: top left;
    }
    .signal-desk-scene--single #artwork,
    .signal-desk-scene--single #notebook {
      position: relative;
      width: min(100%, 680px);
      margin-left: auto;
      margin-right: auto;
      top: auto;
      right: auto;
      left: auto;
      transform: none;
    }
    .signal-room-view__title {
      margin: 0 0 12px;
      font-size: .82rem;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .signal-room-view__artwork {
      width: 100%;
      max-width: 560px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.08);
      display: block;
      margin: 0 0 18px;
    }
    .signal-artframe {
      position: relative;
      width: 100%;
      margin: 0;
      padding: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      transform: rotate(0deg);
      transform-origin: center center;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .signal-artframe:hover {
      transform: rotate(0deg);
    }
    .signal-artframe::before {
      display: none;
    }
    .signal-artwork-wrap {
      position: relative;
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .signal-artwork-wrap::before {
      display: none;
    }
    .signal-artframe__image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      border-radius: 0;
      box-shadow: none;
      background: #000;
    }
    .signal-artframe,
    .signal-artwork-wrap {
      width: 100%;
      height: 100%;
    }
    .signal-notebook {
      width: 100%;
      height: 100%;
      margin: 0;
      position: relative;
      transform: rotate(0.15deg);
      transform-origin: center top;
      border-radius: 0;
      padding: 6% 8% 6% 14%;
      background: linear-gradient(180deg, rgba(244, 232, 207, 0.985) 0%, rgba(237, 222, 188, 0.985) 100%);
      box-shadow: inset 0 0 60px rgba(140, 95, 40, 0.12);
      color: #3f2a17;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.8s ease, transform 220ms ease;
    }
    .signal-notebook:hover {
      transform: rotate(0deg) translateY(-2px);
      box-shadow:
        0 24px 48px rgba(0, 0, 0, .3),
        inset 0 0 0 1px rgba(91, 63, 28, .22);
    }
    .signal-notebook__title {
      display: block;
      margin: 0 0 8% 0;
      font-family: "Caveat", cursive;
      font-size: 7cqw;
      line-height: .92;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #2f1c0f;
      text-align: center;
      padding-bottom: 3%;
      border-bottom: 2px solid rgba(47, 28, 15, 0.55);
    }
    .signal-notebook__paper {
      position: relative;
      padding: 0;
    }
    .signal-notebook__manuscript {
      padding: 0;
    }
    .signal-notebook__line {
      font-family: "Caveat", cursive;
      font-size: 4.4cqw;
      line-height: 1.18;
      letter-spacing: .012em;
      color: #422714;
      margin: 0 0 2%;
      white-space: pre-wrap;
      opacity: 0;
      transform: translateY(8px);
      animation: lyric-line-reveal 520ms ease-out forwards;
    }
    .signal-notebook__line--blank {
      min-height: .9em;
      animation: none;
    }
    .signal-room-view__empty {
      color: rgba(243,239,230,.66);
      font-size: 1rem;
      line-height: 1.7;
    }
    .signal-room--empty header,
    .signal-room--empty footer,
    .signal-room--empty #artwork {
      display: none;
    }
    .signal-room--empty .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-block: 0;
    }
    .signal-room--empty .signal-desk-scene {
      min-height: 100vh;
    }
    .signal-room--empty #notebook {
      width: min(100%, 680px);
      border: none;
      background: transparent;
      padding: 0;
      text-align: center;
    }
    footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: .88rem;
    }
    .signal-room-invocation {
      margin: 48px auto 24px;
      max-width: 720px;
      padding: 0;
      border: none;
      background: transparent;
      border-radius: 0;
      text-align: center;
      color: rgba(250, 235, 210, 0.82);
      font-family: "Caveat", cursive;
      letter-spacing: .01em;
      text-shadow: 0 1px 2px rgba(30, 15, 5, 0.55);
    }
    .signal-room-invocation__title {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 3vw, 2rem);
      line-height: 1.1;
      color: rgba(255, 240, 215, 0.92);
      letter-spacing: .02em;
    }
    .signal-room-invocation__line {
      margin: 2px 0;
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      line-height: 1.35;
    }
    .signal-room-header .nav__link {
      display: none;
    }
    .signal-room-heading {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(14px, 3vw, 26px);
      color: rgba(250, 235, 210, 0.82);
      letter-spacing: .42em;
      text-transform: uppercase;
      margin: 0;
      text-shadow:
        0 1px 0 rgba(40,22,10,0.85),
        0 2px 3px rgba(0,0,0,0.55);
    }
    .signal-room-eyebrow {
      display: none;
    }
    @keyframes signal-fade-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes notebook-rest {
      0%, 100% { transform: rotate(0.3deg) translateY(0px); }
      50% { transform: rotate(0.3deg) translateY(-2px); }
    }
    @keyframes lyric-line-reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @media (max-width: 760px) {
      .wrap { padding-inline: 14px; }
      .signal-desk-scene {
        display: block;
        padding-top: 0;
        padding-bottom: 0;
        perspective: none;
      }
      #artwork,
      #notebook {
        position: relative;
        width: auto;
        margin: 0;
      }
      #artwork {
        position: absolute;
        top: 6.1%;
        left: 4.4%;
        width: 35.1%;
        z-index: 4;
      }
      #notebook {
        position: absolute;
        top: 19.4%;
        left: 41.3%;
        width: 25.8%;
        z-index: 2;
      }
      .signal-artframe {
        width: 100%;
      }
      .signal-artframe__image {
        aspect-ratio: 1 / 1.08;
        object-fit: cover;
        border-radius: 12px;
        box-shadow: none;
      }
      .signal-notebook {
        width: 100%;
      }
      .signal-room--empty .signal-desk-scene {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="signal-room-header">
      <h1 class="signal-room-heading">Live from the Shieldbearer writing desk</h1>
      <div class="signal-room-eyebrow">Shieldbearer</div>
    </header>
    <main class="signal-desk-scene">
      <img class="signal-desk-photo" src="./images/signal-room/table.png" alt="" aria-hidden="true">
      <div id="artwork"></div>
      <div id="notebook"></div>
    </main>
    <footer class="signal-room-invocation">
      <p class="signal-room-invocation__title">Live from the Shieldbearer writing desk.</p>
      <p class="signal-room-invocation__line">Watch the song take shape one line at a time.</p>
      <p class="signal-room-invocation__line">Only the title and lyrics change with each song.</p>
    </footer>
  </div>

  <script>
    const SITE_JSON_URL = window.SIGNAL_ROOM_SITE_JSON_URL || "./site.json";
    const artworkNode = document.getElementById("artwork");
    const notebookNode = document.getElementById("notebook");
    const ARTWORK_CACHE_BUSTER = Date.now().toString(36);

    function normalizeText(value) {
      return String(value || "").trim();
    }

    function normalizeComingSoonEntry(item) {
      return {
        title: normalizeText(item?.title),
        lyrics: normalizeText(item?.lyrics),
        teaserLyrics: normalizeText(item?.teaserLyrics || item?.lyricsPreview || item?.teaser || ""),
        artwork: normalizeText(item?.artwork),
        songMeaning: normalizeText(item?.songMeaning || item?.meaning || ""),
        chords: normalizeText(item?.chords || item?.chordProgression || ""),
        draftNotes: normalizeText(item?.draftNotes || item?.notes || ""),
        status: normalizeText(item?.status || "coming_soon")
      };
    }

    function extractNormalizedSongModel(siteJson) {
      const comingSoon = Array.isArray(siteJson?.comingSoon)
        ? siteJson.comingSoon
        : Array.isArray(siteJson?.incoming)
          ? siteJson.incoming
          : Array.isArray(siteJson?.signal)
            ? siteJson.signal
            : [];
      const source = comingSoon[0] || {};

      return normalizeComingSoonEntry(source);
    }

    function splitLyricsIntoStanzas(lyricsText) {
      return String(lyricsText || "")
        .replace(/\r\n?/g, "\n")
        .trim()
        .split(/\n\s*\n+/)
        .map((stanza) =>
          stanza
            .split("\n")
            .map((line) => line.trimEnd())
            .filter((line, index, lines) => line.length || lines.length === 1)
        )
        .filter((stanza) => stanza.some((line) => line.trim().length));
    }

    function isChorusMarker(line) {
      return /(?:^|\b)(chorus|refrain|hook)(?:\b|:|\s|-)/i.test(String(line || "").trim());
    }

    function withCacheBust(url) {
      const normalized = String(url || "").trim();
      if (!normalized) {
        return "";
      }
      const separator = normalized.includes("?") ? "&" : "?";
      return `${normalized}${separator}v=${encodeURIComponent(ARTWORK_CACHE_BUSTER)}`;
    }

    function buildNotebookPreviewLines(song) {
      const fullLyrics = String(song?.lyrics || "").trim();
      const teaserLyrics = String(song?.teaserLyrics || "").trim();
      const source = fullLyrics || teaserLyrics;
      if (!source) {
        return [];
      }

      const stanzas = splitLyricsIntoStanzas(source);
      if (!stanzas.length) {
        return source.split(/\r?\n/).map((line) => line.trimEnd());
      }

      const preview = [];
      const firstVerse = stanzas[0];
      preview.push(...firstVerse);

      const chorusIndex = stanzas.findIndex((stanza, index) => {
        if (index === 0) {
          return false;
        }
        return stanza.some((line) => isChorusMarker(line));
      });

      if (chorusIndex > 0) {
        preview.push("");
        const chorus = stanzas[chorusIndex].filter((line, lineIndex) => {
          if (lineIndex === 0 && isChorusMarker(line)) {
            return false;
          }
          return true;
        });
        preview.push(...chorus);
      } else if (stanzas.length > 1) {
        preview.push("");
      }

      return preview;
    }

    function renderEmpty() {
      document.body.classList.add("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.add("signal-desk-scene--single");
      }
      if (artworkNode) {
        artworkNode.innerHTML = "";
      }
      if (notebookNode) {
        notebookNode.className = "signal-room-view__empty";
        notebookNode.textContent = "Something is coming\nStay in the Signal to hear it first";
      }
    }

    function renderTitleOnly(song) {
      document.body.classList.remove("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.add("signal-desk-scene--single");
      }
      if (artworkNode) {
        artworkNode.innerHTML = "";
      }
      if (notebookNode) {
        notebookNode.className = "signal-room-view__empty";
        notebookNode.textContent = song?.title || "Untitled";
      }
    }

    function renderArtworkFrame(song) {
      if (artworkNode) {
        artworkNode.className = "";
        artworkNode.innerHTML = "";
      }
      const wrap = document.createElement("section");
      wrap.className = "signal-artwork-wrap";
      const img = document.createElement("img");
      img.className = "signal-artframe__image";
      img.alt = song?.title || "Song artwork";
      img.src = withCacheBust(song?.artwork || "");
      wrap.appendChild(img);
      artworkNode.appendChild(wrap);
    }

    function renderArtworkOnly(song) {
      document.body.classList.remove("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.add("signal-desk-scene--single");
      }
      if (notebookNode) {
        notebookNode.className = "";
        notebookNode.innerHTML = "";
      }
      renderArtworkFrame(song);
    }

    function renderNotebook(song) {
      if (notebookNode) {
        notebookNode.className = "";
        notebookNode.innerHTML = "";
      }

      const notebook = document.createElement("section");
      notebook.className = "signal-notebook";

      const title = document.createElement("h2");
      title.className = "signal-notebook__title";
      title.textContent = song?.title || "Untitled";

      const paper = document.createElement("div");
      paper.className = "signal-notebook__paper signal-notebook__section";
      const manuscript = document.createElement("div");
      manuscript.className = "signal-notebook__manuscript";

      const lines = buildNotebookPreviewLines(song);
      lines.forEach((line, index) => {
        const row = document.createElement("div");
        row.className = line.trim() ? "signal-notebook__line" : "signal-notebook__line signal-notebook__line--blank";
        row.style.animationDelay = `${index * 90}ms`;
        row.textContent = line;
        manuscript.appendChild(row);
      });

      if ((song?.lyrics || song?.teaserLyrics || "").trim()) {
        notebook.dataset.hasLyrics = "true";
      }
      paper.appendChild(manuscript);

      notebook.appendChild(title);
      notebook.appendChild(paper);
      notebookNode.appendChild(notebook);
    }

    function renderLyricsOnly(song) {
      document.body.classList.remove("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.add("signal-desk-scene--single");
      }
      if (artworkNode) {
        artworkNode.className = "";
        artworkNode.innerHTML = "";
      }
      renderNotebook(song);
    }

    function renderFull(song) {
      document.body.classList.remove("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.remove("signal-desk-scene--single");
      }
      renderArtworkFrame(song);
      renderNotebook(song);
    }

    function renderFromModel(data) {
      const song = data?.comingSoon?.[0];

      const hasTitle = !!song?.title;
      const hasLyrics = !!(song?.lyrics || song?.teaserLyrics);
      const hasArtwork = !!song?.artwork;

      if (!hasTitle) renderEmpty();
      else if (hasLyrics && hasArtwork) renderFull(song);
      else if (hasLyrics) renderLyricsOnly(song);
      else if (hasArtwork) renderArtworkOnly(song);
      else renderTitleOnly(song);
    }

    async function loadSongModel() {
      try {
        const res = await fetch(SITE_JSON_URL, { cache: "no-store" });
        if (!res.ok) {
          throw new Error("site.json fetch failed with HTTP " + res.status);
        }
        const siteJson = await res.json();
        const model = extractNormalizedSongModel(siteJson);
        renderFromModel({ comingSoon: [model] });
        window.__SIGNAL_ROOM_MODEL__ = model;
        window.__SIGNAL_ROOM_SOURCE__ = SITE_JSON_URL;
        return model;
      } catch (error) {
        const emptyModel = {
          title: "",
          lyrics: "",
          teaserLyrics: "",
          artwork: "",
          songMeaning: "",
          status: ""
        };
        window.__SIGNAL_ROOM_MODEL__ = emptyModel;
        window.__SIGNAL_ROOM_SOURCE__ = SITE_JSON_URL;
        renderFromModel({ comingSoon: [emptyModel] });
        console.error(error);
        return emptyModel;
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.body.classList.add("is-loaded");
        });
      });

      const revealables = [];

      revealables.forEach((selector, index) => {
        const element = document.querySelector(selector);
        if (!element) {
          return;
        }
        setTimeout(() => {
          element.style.opacity = "1";
        }, 200 + (index * 120));
      });
    });

    loadSongModel().then(() => {
      const scene = document.querySelector(".signal-desk-scene");
      const artwork = document.querySelector(".signal-artwork-wrap");
      const notebook = document.querySelector(".signal-notebook");
      if (scene && !document.body.classList.contains("signal-room--empty")) {
        scene.style.opacity = "1";
      }
      if (artwork) {
        artwork.style.opacity = "1";
      }
      if (notebook) {
        notebook.style.opacity = "1";
      }
    });
  </script>
</body>
</html>
