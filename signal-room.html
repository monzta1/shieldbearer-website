<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shieldbearer Signal Room</title>
  <meta name="description" content="Event-driven Signal Room rendered from the EventStream feed on GitHub Pages.">
  <meta name="theme-color" content="#090909">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap');

    :root {
      --bg: #090909;
      --panel: rgba(255,255,255,.04);
      --panel-strong: rgba(255,255,255,.08);
      --line: rgba(231,76,60,.24);
      --text: #f3efe6;
      --muted: rgba(243,239,230,.72);
      --accent: #e74c3c;
      --accent-soft: rgba(231,76,60,.14);
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; color: var(--text); font-family: var(--sans); }
    body {
      min-height: 100vh;
      padding: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
      background:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(201, 168, 76, 0.04) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 50% 85%, rgba(255, 220, 120, 0.06) 0%, transparent 60%),
        linear-gradient(180deg, #0a0806 0%, #100d09 35%, #13100c 55%, #0d0b08 70%, #080705 100%);
      overflow-x: hidden;
    }
    body.is-loaded { opacity: 1; }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 24px 20px 72px; position: relative; z-index: 2; }
    header,
    footer {
      border: 1px solid rgba(255,255,255,.05);
      background: rgba(255,255,255,.015);
      border-radius: 18px;
      padding: 14px 18px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }
    .signal-room-header {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      text-align: center;
      pointer-events: none;
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
    }
    .nav__brand {
      font-family: var(--mono);
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--text);
      font-size: .78rem;
    }
    .nav__link {
      color: var(--muted);
      text-decoration: none;
      font-size: .9rem;
    }
    .signal-desk-scene {
      position: relative;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(320px, 1.4fr);
      gap: 18px;
      min-height: 60vh;
      padding-top: 14vh;
      padding-bottom: 6vh;
    }
    .signal-desk-scene::before {
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 45vh;
      background:
        repeating-linear-gradient(91deg, transparent 0px, transparent 60px, rgba(255,255,255,0.007) 60px, rgba(255,255,255,0.007) 61px),
        repeating-linear-gradient(89deg, transparent 0px, transparent 100px, rgba(0,0,0,0.03) 100px, rgba(0,0,0,0.03) 102px),
        linear-gradient(180deg, #0f0c09 0%, #141008 100%);
      z-index: 0;
      pointer-events: none;
    }
    .signal-desk-scene::after {
      content: "";
      position: fixed;
      bottom: 45vh;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(180, 140, 80, 0.15) 20%, rgba(200, 160, 90, 0.25) 50%, rgba(180, 140, 80, 0.15) 80%, transparent 100%);
      z-index: 1;
      pointer-events: none;
    }
    .signal-desk-scene > * {
      animation: signal-fade-in 420ms ease-out both;
      position: relative;
      z-index: 2;
    }
    .signal-desk-scene > *:nth-child(2) {
      animation-delay: 70ms;
    }
    .signal-desk-scene > *:nth-child(3) {
      animation-delay: 140ms;
    }
    .signal-desk-scene--single {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 10vh;
    }
    #artwork,
    #notebook {
      border: 1px solid rgba(255,255,255,.02);
      background: transparent;
      border-radius: 20px;
      padding: 22px;
    }
    .signal-desk-scene--single #artwork,
    .signal-desk-scene--single #notebook {
      width: min(100%, 680px);
    }
    .signal-room-view__title {
      margin: 0 0 12px;
      font-size: .82rem;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .signal-room-view__artwork {
      width: 100%;
      max-width: 560px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.08);
      display: block;
      margin: 0 0 18px;
    }
    .signal-artframe {
      position: relative;
      width: min(100%, 560px);
      margin: 0 auto 12px;
      padding: 18px 18px 16px;
      border-radius: 20px;
      background: linear-gradient(180deg, #16110c 0%, #0c0906 100%);
      filter:
        drop-shadow(0 20px 40px rgba(0,0,0,0.9))
        drop-shadow(4px 8px 16px rgba(0,0,0,0.7))
        drop-shadow(-2px -1px 0 rgba(255,220,120,0.04));
      transform: rotate(-2deg);
      transform-origin: center top;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .signal-artframe:hover {
      transform: rotate(0deg);
    }
    .signal-artframe::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 50%;
      width: 12px;
      height: 12px;
      margin-left: -6px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #d9cab7 0 20%, #5b4630 21% 100%);
      box-shadow: 0 1px 0 rgba(255,255,255,.35), 0 3px 10px rgba(0,0,0,.35);
    }
    .signal-artwork-wrap {
      position: relative;
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .signal-artwork-wrap::before {
      content: "";
      position: absolute;
      top: -40px;
      left: -40px;
      right: -40px;
      bottom: -40px;
      background: radial-gradient(ellipse at center, rgba(255, 220, 120, 0.03) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
    }
    .signal-artframe__mat {
      padding: 18px;
      border-radius: 14px;
      background: linear-gradient(180deg, #f2e8d4 0%, #eadfc5 100%);
      box-shadow: inset 0 0 0 1px rgba(96, 74, 48, .16);
    }
    .signal-artframe__image {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .22);
    }
    .signal-artframe__caption {
      margin: 12px 0 0;
      text-align: center;
      font-family: "Caveat", cursive;
      font-size: clamp(1.5rem, 3vw, 2rem);
      line-height: 1;
      color: #3b2615;
    }
    .signal-notebook {
      width: min(100%, 620px);
      margin: 0 auto;
      position: relative;
      transform: rotate(0.3deg);
      transform-origin: center top;
      border-radius: 18px;
      padding: 26px 24px 26px 42px;
      background:
        linear-gradient(90deg, rgba(185, 146, 92, .18) 0 18px, transparent 18px 100%),
        repeating-linear-gradient(180deg, rgba(88, 61, 31, .06) 0 1px, transparent 1px 34px),
        linear-gradient(180deg, #f4e9cf 0%, #efe1bf 100%);
      box-shadow:
        0 30px 60px rgba(0,0,0,0.8),
        0 8px 20px rgba(0,0,0,0.6),
        0 2px 4px rgba(0,0,0,0.4),
        0 -1px 0 rgba(255, 220, 120, 0.08),
        inset 0 0 0 1px rgba(91, 63, 28, .18);
      color: #3f2a17;
      overflow: hidden;
      transition: transform 220ms ease, box-shadow 220ms ease;
      animation: notebook-rest 8s ease-in-out infinite;
      opacity: 0;
      transition: opacity 0.8s ease, transform 220ms ease, box-shadow 220ms ease;
    }
    .signal-notebook:hover {
      transform: rotate(0deg) translateY(-2px);
      box-shadow:
        0 24px 48px rgba(0, 0, 0, .3),
        inset 0 0 0 1px rgba(91, 63, 28, .22);
    }
    .signal-notebook::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(180deg, rgba(255, 240, 200, 0.03) 0%, transparent 100%);
      pointer-events: none;
      border-radius: 2px 2px 0 0;
    }
    .signal-notebook__corner-pencil {
      position: absolute;
      top: 16px;
      right: 18px;
      width: 30px;
      height: 30px;
      opacity: .42;
      transform: rotate(-22deg);
      transform-origin: center center;
      pointer-events: none;
    }
    .signal-notebook::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 22px;
      width: 2px;
      background: rgba(168, 61, 35, .24);
      pointer-events: none;
    }
    .signal-notebook__title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 10px;
      font-family: "Caveat", cursive;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: .95;
      font-weight: 700;
      letter-spacing: .01em;
      color: #2f1c0f;
    }
    .signal-notebook__pencil {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      color: #8d5b22;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,.18));
    }
    .signal-notebook__paper {
      position: relative;
      padding: 6px 0 2px;
    }
    .signal-notebook__line {
      font-family: "Caveat", cursive;
      font-size: clamp(1.55rem, 2.7vw, 2rem);
      line-height: 1.04;
      letter-spacing: .01em;
      color: #422714;
      margin: 0 0 4px;
      white-space: pre-wrap;
    }
    .signal-notebook__line--blank {
      min-height: 1em;
    }
    .signal-notebook__fade {
      position: absolute;
      left: 42px;
      right: 20px;
      bottom: 20px;
      height: 96px;
      background: linear-gradient(180deg, rgba(239, 225, 191, 0) 0%, rgba(239, 225, 191, .84) 62%, rgba(239, 225, 191, 1) 100%);
      pointer-events: none;
    }
    .signal-notebook--teaser .signal-notebook__paper {
      max-height: 320px;
      overflow: hidden;
    }
    .signal-notebook--teaser .signal-notebook__line:last-of-type {
      margin-bottom: 0;
    }
    .signal-room-view__empty {
      color: rgba(243,239,230,.66);
      font-size: 1rem;
      line-height: 1.7;
    }
    .signal-room--empty header,
    .signal-room--empty footer,
    .signal-room--empty #artwork {
      display: none;
    }
    .signal-room--empty .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-block: 0;
    }
    .signal-room--empty .signal-desk-scene {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: auto;
      width: 100%;
      padding-top: 18vh;
    }
    .signal-room--empty #notebook {
      width: min(100%, 680px);
      border: none;
      background: transparent;
      padding: 0;
      text-align: center;
    }
    footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: .88rem;
    }
    .studio-lamp {
      position: fixed;
      top: 0;
      right: 80px;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .lamp-arm {
      width: 3px;
      height: 120px;
      background: linear-gradient(180deg, #2a2218, #1a150f);
      transform: rotate(15deg);
      transform-origin: top center;
      margin-left: 40px;
    }
    .lamp-head {
      width: 60px;
      height: 24px;
      background: linear-gradient(180deg, #2a2218, #1a150f);
      border-radius: 4px 4px 8px 8px;
      transform: rotate(15deg);
      margin-top: -4px;
      margin-left: 14px;
    }
    .lamp-light-cone {
      position: absolute;
      top: 110px;
      left: 0;
      width: 0;
      height: 0;
      border-left: 80px solid transparent;
      border-right: 80px solid transparent;
      border-top: 0;
      border-bottom: 200px solid rgba(255, 220, 100, 0.025);
      transform: rotate(15deg);
      transform-origin: top center;
      filter: blur(20px);
    }
    .desk-pick {
      position: fixed;
      bottom: 60px;
      right: 8vw;
      transform: rotate(25deg);
      opacity: 0.7;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
      z-index: 2;
      pointer-events: none;
    }
    .desk-coffee-ring {
      position: fixed;
      bottom: 80px;
      left: 10vw;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid rgba(120, 80, 40, 0.15);
      box-shadow:
        0 0 0 1px rgba(120, 80, 40, 0.08),
        inset 0 0 8px rgba(120, 80, 40, 0.05);
      z-index: 2;
      pointer-events: none;
    }
    .signal-room-header .nav__link {
      display: none;
    }
    .signal-room-heading {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(14px, 3vw, 24px);
      color: rgba(180, 150, 100, 0.12);
      letter-spacing: .4em;
      text-transform: uppercase;
      margin: 0;
    }
    .signal-room-eyebrow {
      display: none;
    }
    @keyframes signal-fade-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes notebook-rest {
      0%, 100% { transform: rotate(0.3deg) translateY(0px); }
      50% { transform: rotate(0.3deg) translateY(-2px); }
    }
    @media (max-width: 760px) {
      .wrap { padding-inline: 14px; }
      .signal-desk-scene {
        grid-template-columns: 1fr;
        padding-top: 10vh;
        padding-bottom: 4vh;
        perspective: none;
      }
      .signal-desk-scene::before {
        height: 42vh;
      }
      .signal-desk-scene::after {
        bottom: 42vh;
      }
      .studio-lamp {
        right: 26px;
        transform: scale(.82);
        transform-origin: top right;
      }
      .desk-pick {
        right: 28px;
        bottom: 12px;
      }
      .desk-coffee-ring {
        left: 28px;
        bottom: 24px;
      }
      .signal-room--empty .signal-desk-scene {
        padding-top: 12vh;
      }
    }
  </style>
</head>
<body>
  <div class="studio-lamp" aria-hidden="true">
    <div class="lamp-arm"></div>
    <div class="lamp-head"></div>
    <div class="lamp-light-cone"></div>
  </div>
  <div class="wrap">
    <header class="signal-room-header">
      <h1 class="signal-room-heading">Signal Room</h1>
      <div class="signal-room-eyebrow">Shieldbearer</div>
    </header>
    <main class="signal-desk-scene">
      <div class="desk-coffee-ring" aria-hidden="true"></div>
      <div class="desk-pick" aria-hidden="true">
        <svg viewBox="0 0 30 36" width="30" height="36">
          <path d="M15 2 C6 2 2 10 2 18 C2 28 10 34 15 34 C20 34 28 28 28 18 C28 10 24 2 15 2Z"
                fill="#c9a84c" opacity="0.6" stroke="#a07820" stroke-width="0.5"/>
          <text x="15" y="20" text-anchor="middle" font-size="6" fill="#805010" opacity="0.8">SB</text>
        </svg>
      </div>
      <div id="artwork"></div>
      <div id="notebook"></div>
    </main>
    <footer>
      Powered by the Shieldbearer event pipeline.
    </footer>
  </div>

  <script>
    const SITE_JSON_URL = window.SIGNAL_ROOM_SITE_JSON_URL || "./site.json";
    const artworkNode = document.getElementById("artwork");
    const notebookNode = document.getElementById("notebook");
    const ARTWORK_CACHE_BUSTER = Date.now().toString(36);

    function normalizeText(value) {
      return String(value || "").trim();
    }

    function normalizeComingSoonEntry(item) {
      return {
        title: normalizeText(item?.title),
        lyrics: normalizeText(item?.lyrics),
        teaserLyrics: normalizeText(item?.teaserLyrics || item?.lyricsPreview || item?.teaser || ""),
        artwork: normalizeText(item?.artwork),
        songMeaning: normalizeText(item?.songMeaning || item?.meaning || ""),
        status: normalizeText(item?.status || "coming_soon")
      };
    }

    function extractNormalizedSongModel(siteJson) {
      const comingSoon = Array.isArray(siteJson?.comingSoon)
        ? siteJson.comingSoon
        : Array.isArray(siteJson?.incoming)
          ? siteJson.incoming
          : Array.isArray(siteJson?.signal)
            ? siteJson.signal
            : [];
      const source = comingSoon[0] || {};

      return normalizeComingSoonEntry(source);
    }

    function splitLyricsIntoStanzas(lyricsText) {
      return String(lyricsText || "")
        .replace(/\r\n?/g, "\n")
        .trim()
        .split(/\n\s*\n+/)
        .map((stanza) =>
          stanza
            .split("\n")
            .map((line) => line.trimEnd())
            .filter((line, index, lines) => line.length || lines.length === 1)
        )
        .filter((stanza) => stanza.some((line) => line.trim().length));
    }

    function isChorusMarker(line) {
      return /(?:^|\b)(chorus|refrain|hook)(?:\b|:|\s|-)/i.test(String(line || "").trim());
    }

    function withCacheBust(url) {
      const normalized = String(url || "").trim();
      if (!normalized) {
        return "";
      }
      const separator = normalized.includes("?") ? "&" : "?";
      return `${normalized}${separator}v=${encodeURIComponent(ARTWORK_CACHE_BUSTER)}`;
    }

    function buildNotebookPreviewLines(song) {
      const fullLyrics = String(song?.lyrics || "").trim();
      const teaserLyrics = String(song?.teaserLyrics || "").trim();
      const source = fullLyrics || teaserLyrics;
      if (!source) {
        return [];
      }

      const stanzas = splitLyricsIntoStanzas(source);
      if (!stanzas.length) {
        return source.split(/\r?\n/).map((line) => line.trimEnd());
      }

      const preview = [];
      const firstVerse = stanzas[0];
      preview.push(...firstVerse);

      const chorusIndex = stanzas.findIndex((stanza, index) => {
        if (index === 0) {
          return false;
        }
        return stanza.some((line) => isChorusMarker(line));
      });

      if (chorusIndex > 0) {
        preview.push("");
        const chorus = stanzas[chorusIndex].filter((line, lineIndex) => {
          if (lineIndex === 0 && isChorusMarker(line)) {
            return false;
          }
          return true;
        });
        preview.push(...chorus);
      } else if (stanzas.length > 1) {
        preview.push("");
      }

      return preview;
    }

    function renderEmpty() {
      document.body.classList.add("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.add("signal-desk-scene--single");
      }
      if (artworkNode) {
        artworkNode.innerHTML = "";
      }
      if (notebookNode) {
        notebookNode.className = "signal-room-view__empty";
        notebookNode.textContent = "Something is coming\nStay in the Signal to hear it first";
      }
    }

    function renderTitleOnly(song) {
      document.body.classList.remove("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.add("signal-desk-scene--single");
      }
      if (artworkNode) {
        artworkNode.innerHTML = "";
      }
      if (notebookNode) {
        notebookNode.className = "signal-room-view__empty";
        notebookNode.textContent = song?.title || "Untitled";
      }
    }

    function renderArtworkFrame(song) {
      if (artworkNode) {
        artworkNode.className = "";
        artworkNode.innerHTML = "";
      }
      const wrap = document.createElement("section");
      wrap.className = "signal-artwork-wrap";
      const frame = document.createElement("section");
      frame.className = "signal-artframe";

      const mat = document.createElement("div");
      mat.className = "signal-artframe__mat";

      const img = document.createElement("img");
      img.className = "signal-artframe__image";
      img.alt = song?.title || "Song artwork";
      img.src = withCacheBust(song?.artwork || "");

      const caption = document.createElement("p");
      caption.className = "signal-artframe__caption";
      caption.textContent = song?.title || "Untitled";

      mat.appendChild(img);
      frame.appendChild(mat);
      frame.appendChild(caption);
      wrap.appendChild(frame);
      artworkNode.appendChild(wrap);
    }

    function renderArtworkOnly(song) {
      document.body.classList.remove("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.add("signal-desk-scene--single");
      }
      if (notebookNode) {
        notebookNode.className = "";
        notebookNode.innerHTML = "";
      }
      renderArtworkFrame(song);
    }

    function renderNotebook(song) {
      if (notebookNode) {
        notebookNode.className = "";
        notebookNode.innerHTML = "";
      }

      const notebook = document.createElement("section");
      notebook.className = "signal-notebook";

      const pencil = document.createElement("svg");
      pencil.className = "signal-notebook__corner-pencil";
      pencil.setAttribute("viewBox", "0 0 24 24");
      pencil.setAttribute("aria-hidden", "true");
      pencil.innerHTML = '<path fill="currentColor" d="M3 17.25V21h3.75L17.8 9.95l-3.75-3.75L3 17.25Zm14.71-8.04a1 1 0 0 0 0-1.41l-1.51-1.51a1 1 0 0 0-1.41 0l-1.2 1.2 2.93 2.93 1.19-1.21Z"/>';

      const title = document.createElement("h2");
      title.className = "signal-notebook__title";
      title.innerHTML = `
        <svg class="signal-notebook__pencil" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M3 17.25V21h3.75L17.8 9.95l-3.75-3.75L3 17.25Zm14.71-8.04a1 1 0 0 0 0-1.41l-1.51-1.51a1 1 0 0 0-1.41 0l-1.2 1.2 2.93 2.93 1.19-1.21Z"/>
        </svg>
        <span>${song?.title || "Untitled"}</span>
      `;

      const paper = document.createElement("div");
      paper.className = "signal-notebook__paper";

      const lines = buildNotebookPreviewLines(song);
      lines.forEach((line) => {
        const row = document.createElement("div");
        row.className = line.trim() ? "signal-notebook__line" : "signal-notebook__line signal-notebook__line--blank";
        row.textContent = line;
        paper.appendChild(row);
      });

      if ((song?.lyrics || song?.teaserLyrics || "").trim()) {
        notebook.classList.add("signal-notebook--teaser");
        const fade = document.createElement("div");
        fade.className = "signal-notebook__fade";
        notebook.appendChild(fade);
      }

      notebook.appendChild(pencil);
      notebook.appendChild(title);
      notebook.appendChild(paper);
      notebookNode.appendChild(notebook);
    }

    function renderLyricsOnly(song) {
      document.body.classList.remove("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.add("signal-desk-scene--single");
      }
      if (artworkNode) {
        artworkNode.className = "";
        artworkNode.innerHTML = "";
      }
      renderNotebook(song);
    }

    function renderFull(song) {
      document.body.classList.remove("signal-room--empty");
      const scene = document.querySelector(".signal-desk-scene");
      if (scene) {
        scene.classList.remove("signal-desk-scene--single");
      }
      renderArtworkFrame(song);
      renderNotebook(song);
    }

    function renderFromModel(data) {
      const song = data?.comingSoon?.[0];

      const hasTitle = !!song?.title;
      const hasLyrics = !!(song?.lyrics || song?.teaserLyrics);
      const hasArtwork = !!song?.artwork;

      if (!hasTitle) renderEmpty();
      else if (hasLyrics && hasArtwork) renderFull(song);
      else if (hasLyrics) renderLyricsOnly(song);
      else if (hasArtwork) renderArtworkOnly(song);
      else renderTitleOnly(song);
    }

    async function loadSongModel() {
      try {
        const res = await fetch(SITE_JSON_URL, { cache: "no-store" });
        if (!res.ok) {
          throw new Error("site.json fetch failed with HTTP " + res.status);
        }
        const siteJson = await res.json();
        const model = extractNormalizedSongModel(siteJson);
        renderFromModel({ comingSoon: [model] });
        window.__SIGNAL_ROOM_MODEL__ = model;
        window.__SIGNAL_ROOM_SOURCE__ = SITE_JSON_URL;
        return model;
      } catch (error) {
        const emptyModel = {
          title: "",
          lyrics: "",
          teaserLyrics: "",
          artwork: "",
          songMeaning: "",
          status: ""
        };
        window.__SIGNAL_ROOM_MODEL__ = emptyModel;
        window.__SIGNAL_ROOM_SOURCE__ = SITE_JSON_URL;
        renderFromModel({ comingSoon: [emptyModel] });
        console.error(error);
        return emptyModel;
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.body.classList.add("is-loaded");
        });
      });

      const lamp = document.querySelector(".studio-lamp");
      if (lamp) {
        setTimeout(() => {
          lamp.style.opacity = "1";
        }, 400);
      }

      const artwork = document.querySelector(".signal-artwork-wrap");
      if (artwork) {
        setTimeout(() => {
          artwork.style.opacity = "1";
        }, 800);
      }

      const notebook = document.querySelector(".signal-notebook");
      if (notebook) {
        setTimeout(() => {
          notebook.style.opacity = "1";
        }, 1200);
      }
    });

    if (window.matchMedia("(pointer: fine)").matches) {
      document.addEventListener("mousemove", (e) => {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const dx = (e.clientX - cx) / cx;
        const dy = (e.clientY - cy) / cy;

        const lamp = document.querySelector(".studio-lamp");
        if (lamp) {
          lamp.style.transform = `translate(${dx * 2}px, ${dy * 1}px)`;
        }

        const artwork = document.querySelector(".signal-artwork-wrap");
        if (artwork) {
          artwork.style.transform = `translate(${dx * -5}px, ${dy * -3}px)`;
        }

        const notebook = document.querySelector(".signal-notebook");
        if (notebook) {
          notebook.style.transform = `rotate(0.3deg) translate(${dx * 8}px, ${dy * 5}px)`;
        }

        const pick = document.querySelector(".desk-pick");
        if (pick) {
          pick.style.transform = `rotate(25deg) translate(${dx * 10}px, ${dy * 6}px)`;
        }
      });
    }

    loadSongModel().then(() => {
      const scene = document.querySelector(".signal-desk-scene");
      const artwork = document.querySelector(".signal-artwork-wrap");
      const notebook = document.querySelector(".signal-notebook");
      if (scene && !document.body.classList.contains("signal-room--empty")) {
        scene.style.opacity = "1";
      }
      if (artwork) {
        artwork.style.opacity = "1";
      }
      if (notebook) {
        notebook.style.opacity = "1";
      }
    });
  </script>
</body>
</html>
