<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shieldbearer Signal Room</title>
  <meta name="description" content="Event-driven Signal Room rendered from the EventStream feed on GitHub Pages.">
  <meta name="theme-color" content="#090909">
  <style>
    :root {
      --bg: #090909;
      --panel: rgba(255,255,255,.04);
      --panel-strong: rgba(255,255,255,.08);
      --line: rgba(231,76,60,.24);
      --text: #f3efe6;
      --muted: rgba(243,239,230,.72);
      --accent: #e74c3c;
      --accent-soft: rgba(231,76,60,.14);
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: radial-gradient(circle at top, #161616 0%, #090909 58%); color: var(--text); font-family: var(--sans); }
    body { padding: 0; }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 40px 20px 72px; }
    .hero {
      padding: 42px 28px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
    }
    .eyebrow {
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--muted);
      font-size: .74rem;
      margin: 0 0 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 5rem);
      line-height: .92;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .sub {
      margin: 18px 0 0;
      max-width: 780px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1.02rem;
    }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      margin-bottom: 22px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      background: rgba(255,255,255,.03);
    }
    .nav__brand {
      font-family: var(--mono);
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--text);
      font-size: .78rem;
    }
    .nav__link {
      color: var(--muted);
      text-decoration: none;
      font-size: .9rem;
    }
    .footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: .88rem;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="nav">
        <div class="nav__brand">Shieldbearer</div>
        <a class="nav__link" href="/index.html">Home</a>
      </div>
      <p class="eyebrow">Signal Room reset</p>
      <h1>Minimal shell</h1>
      <p class="sub">
        The old Signal Room dashboard has been removed. This page now keeps the
        site frame and the data fetch hook only.
      </p>
      <div class="footer">
        Powered by the Shieldbearer event pipeline.
      </div>
    </section>
  </main>

  <script>
    const SITE_JSON_URL = window.SIGNAL_ROOM_SITE_JSON_URL || "./site.json";

    function normalizeText(value) {
      return String(value || "").trim();
    }

    function normalizeComingSoonEntry(item) {
      return {
        title: normalizeText(item?.title),
        lyrics: normalizeText(item?.lyrics),
        teaserLyrics: normalizeText(item?.teaserLyrics || item?.lyricsPreview || item?.teaser || ""),
        artwork: normalizeText(item?.artwork),
        songMeaning: normalizeText(item?.songMeaning || item?.meaning || ""),
        status: normalizeText(item?.status || "coming_soon")
      };
    }

    function extractNormalizedSongModel(siteJson) {
      const comingSoon = Array.isArray(siteJson?.comingSoon)
        ? siteJson.comingSoon
        : Array.isArray(siteJson?.incoming)
          ? siteJson.incoming
          : Array.isArray(siteJson?.signal)
            ? siteJson.signal
            : [];
      const source = comingSoon[0] || {};

      return normalizeComingSoonEntry(source);
    }

    async function loadSongModel() {
      try {
        const res = await fetch(SITE_JSON_URL, { cache: "no-store" });
        if (!res.ok) {
          throw new Error("site.json fetch failed with HTTP " + res.status);
        }
        const siteJson = await res.json();
        const model = extractNormalizedSongModel(siteJson);
        window.__SIGNAL_ROOM_MODEL__ = model;
        window.__SIGNAL_ROOM_SOURCE__ = SITE_JSON_URL;
        return model;
      } catch (error) {
        const emptyModel = {
          title: "",
          lyrics: "",
          teaserLyrics: "",
          artwork: "",
          songMeaning: "",
          status: ""
        };
        window.__SIGNAL_ROOM_MODEL__ = emptyModel;
        window.__SIGNAL_ROOM_SOURCE__ = SITE_JSON_URL;
        console.error(error);
        return emptyModel;
      }
    }

    loadSongModel();
  </script>
</body>
</html>
